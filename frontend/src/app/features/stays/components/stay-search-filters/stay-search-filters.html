<div class="stay-search-filters" [attr.aria-label]="text().stays.filters.searchAriaLabel">
  <label class="search-filter">
    <span>{{ text().stays.filters.cat }}</span>

    <div class="search-control">
      <input
        type="text"
        autocomplete="off"
        [placeholder]="text().stays.filters.searchCat"
        [ngModel]="catSearch()"
        (ngModelChange)="onCatSearchChange($event)"
      />

      @if (selectedCatId()) {
        <button type="button" (click)="clearCat()">{{ text().stays.filters.clear }}</button>
      }
    </div>

    @if (matchingCatOptions().length > 0) {
      <ul class="search-options">
        @for (option of matchingCatOptions(); track option.catId) {
          <li>
            <button type="button" (click)="selectCat(option)">
              {{ option.label }}
            </button>
          </li>
        }
      </ul>
    } @else if (catSearch().trim() && !selectedCatId()) {
      <small class="empty-options">{{ text().stays.filters.noCatsMatch }}</small>
    }
  </label>

  <label class="search-filter">
    <span>{{ text().stays.filters.owner }}</span>

    <div class="search-control">
      <input
        type="text"
        autocomplete="off"
        [placeholder]="text().stays.filters.searchOwnerOrCats"
        [ngModel]="ownerSearch()"
        (ngModelChange)="onOwnerSearchChange($event)"
      />

      @if (selectedOwnerId()) {
        <button type="button" (click)="clearOwner()">{{ text().stays.filters.clear }}</button>
      }
    </div>

    @if (matchingOwnerOptions().length > 0) {
      <ul class="search-options">
        @for (option of matchingOwnerOptions(); track option.ownerId) {
          <li>
            <button type="button" (click)="selectOwner(option)">
              {{ option.label }}
            </button>
          </li>
        }
      </ul>
    } @else if (ownerSearch().trim() && !selectedOwnerId()) {
      <small class="empty-options">{{ text().stays.filters.noOwnersMatch }}</small>
    }
  </label>
</div>
