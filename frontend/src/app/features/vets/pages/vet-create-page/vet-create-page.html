<section class="vet-create-page">
  <header class="page-header">
    <h2>{{ text().vets.create.title }}</h2>
    <p>{{ text().vets.create.description }}</p>
  </header>

  <form class="vet-form" (ngSubmit)="submit()">
    @if (error()) {
      <div class="error-message">
        <p>{{ error() }}</p>
      </div>
    }

    <label>
      {{ text().vets.form.name }}
      <input type="text" name="name" [ngModel]="name()" (ngModelChange)="name.set($event)" />
    </label>

    <label>
      {{ text().vets.form.address }}
      <input
        type="text"
        name="address"
        [ngModel]="address()"
        (ngModelChange)="address.set($event)"
      />
    </label>

    <label>
      {{ text().vets.form.phoneNumber }}
      <input
        type="text"
        name="phoneNumber"
        [ngModel]="phoneNumber()"
        (ngModelChange)="phoneNumber.set($event)"
      />
    </label>

    <div class="form-actions">
      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? text().vets.create.submitting : text().vets.create.submit }}
      </button>
    </div>
  </form>
</section>
