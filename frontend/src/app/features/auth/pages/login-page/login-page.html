<section class="login-page">
  <header class="page-header">
    <span class="login-logo">
      <img src="/catworld-logo.png" [alt]="text().auth.login.logoAlt" />
    </span>
    <h2>{{ text().auth.login.title }}</h2>
    <p>{{ text().auth.login.description }}</p>
  </header>

  @if (error()) {
    <div class="error-message">
      <p>{{ error() }}</p>
    </div>
  }

  <form class="login-form" (ngSubmit)="submit()">
    <label>
      {{ text().auth.login.username }}
      <input
        type="text"
        name="username"
        autocomplete="username"
        [ngModel]="username()"
        (ngModelChange)="username.set($event)"
      />
    </label>

    <label>
      {{ text().auth.login.password }}
      <input
        type="password"
        name="password"
        autocomplete="current-password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
      />
    </label>

    <div class="form-actions">
      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? text().auth.login.submitting : text().auth.login.submit }}
      </button>
    </div>
  </form>
</section>
