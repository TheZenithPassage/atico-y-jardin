<section class="owner-edit-page">
  <header class="page-header">
    <div>
      <h2>{{ text().owners.edit.title }}</h2>
      <p>{{ text().owners.edit.description }}</p>
    </div>

    <a routerLink="/owners" class="secondary-action">{{ text().owners.edit.backToOwners }}</a>
  </header>

  @if (loading()) {
    <p>{{ text().owners.edit.loading }}</p>
  } @else {
    @if (error()) {
      <div class="error-message">
        <p>{{ error() }}</p>
      </div>
    }

    @if (ownerLoaded()) {
      <form class="owner-form" (ngSubmit)="submit()">
        <label>
          {{ text().owners.form.fullName }}
          <input
            type="text"
            name="fullName"
            [ngModel]="fullName()"
            (ngModelChange)="fullName.set($event)"
          />
        </label>

        <label>
          {{ text().owners.form.primaryPhone }}
          <input
            type="text"
            name="primaryPhone"
            [ngModel]="primaryPhone()"
            (ngModelChange)="primaryPhone.set($event)"
          />
        </label>

        <label>
          {{ text().owners.form.address }}
          <input
            type="text"
            name="address"
            [ngModel]="address()"
            (ngModelChange)="address.set($event)"
          />
        </label>

        <label>
          {{ text().owners.form.secondaryPhone }}
          <input
            type="text"
            name="secondaryPhone"
            [ngModel]="secondaryPhone()"
            (ngModelChange)="secondaryPhone.set($event)"
          />
        </label>

        <label>
          {{ text().owners.form.secondaryPhoneName }}
          <input
            type="text"
            name="secondaryPhoneName"
            [ngModel]="secondaryPhoneName()"
            (ngModelChange)="secondaryPhoneName.set($event)"
          />
        </label>

        <label>
          {{ text().owners.form.instagram }}
          <input
            type="text"
            name="instagram"
            [ngModel]="instagram()"
            (ngModelChange)="instagram.set($event)"
          />
        </label>

        <label>
          {{ text().owners.form.facebook }}
          <input
            type="text"
            name="facebook"
            [ngModel]="facebook()"
            (ngModelChange)="facebook.set($event)"
          />
        </label>

        <div class="form-actions">
          <button type="submit" [disabled]="submitting()">
            {{ submitting() ? text().owners.edit.submitting : text().owners.edit.submit }}
          </button>
        </div>
      </form>
    }
  }
</section>
