services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-catworld}
      MYSQL_USER: ${DB_USER:-catworld}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_local_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_local_root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER:-catworld} -p${DB_PASSWORD:-change_me_local_password} --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-catworld}
      DB_USER: ${DB_USER:-catworld}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_local_password}
      CATWORLD_SECURITY_USERNAME: ${CATWORLD_SECURITY_USERNAME:-admin}
      CATWORLD_SECURITY_PASSWORD: ${CATWORLD_SECURITY_PASSWORD:-change_me_local_admin_password}
      CATWORLD_SECURITY_CORS_ALLOWED_ORIGINS: ${CATWORLD_SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - app

volumes:
  mysql_data: