spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:catworld}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=${DB_TIMEZONE:Europe/Madrid}
spring.datasource.username=${DB_USER:catworld}
spring.datasource.password=${DB_PASSWORD:change_me_local_password}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
